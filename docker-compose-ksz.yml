# 小智服务端全模块部署 - KSZ 二次开发本地构建版 (Host 网络模式)
# 用法: docker compose -f docker-compose-ksz.yml up -d

services:
  xiaozhi-esp32-server:
    image: xiaozhi-esp32-server:server_local
    container_name: xiaozhi-esp32-server
    depends_on:
      xiaozhi-esp32-server-db:
        condition: service_healthy
      xiaozhi-esp32-server-redis:
        condition: service_healthy
    restart: always
    network_mode: host
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ${DATA_DIR:-./data}:/opt/xiaozhi-esp32-server/data
      - ${MODEL_PATH:-./models/SenseVoiceSmall/model.pt}:/opt/xiaozhi-esp32-server/models/SenseVoiceSmall/model.pt

  xiaozhi-esp32-server-web:
    image: xiaozhi-esp32-server:web_local
    container_name: xiaozhi-esp32-server-web
    restart: always
    network_mode: host
    depends_on:
      xiaozhi-esp32-server-db:
        condition: service_healthy
      xiaozhi-esp32-server-redis:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      - SPRING_DATASOURCE_DRUID_URL=jdbc:mysql://127.0.0.1:3306/xiaozhi_esp32_server?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&connectTimeout=30000&socketTimeout=30000&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
      - SPRING_DATASOURCE_DRUID_USERNAME=root
      - SPRING_DATASOURCE_DRUID_PASSWORD=123456
      - SPRING_DATA_REDIS_HOST=127.0.0.1
      - SPRING_DATA_REDIS_PASSWORD=
      - SPRING_DATA_REDIS_PORT=6379
    volumes:
      - ${UPLOAD_DIR:-./uploadfile}:/uploadfile

  xiaozhi-esp32-server-db:
    image: mysql:latest
    container_name: xiaozhi-esp32-server-db
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 45s
      interval: 10s
      retries: 10
    restart: always
    network_mode: host
    volumes:
      - ${MYSQL_DATA_DIR:-./mysql/data}:/var/lib/mysql
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=xiaozhi_esp32_server
      - MYSQL_INITDB_ARGS="--character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci"

  xiaozhi-esp32-server-redis:
    image: redis:8.0
    container_name: xiaozhi-esp32-server-redis
    restart: always
    network_mode: host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
